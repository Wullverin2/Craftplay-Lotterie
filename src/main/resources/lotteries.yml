# DE: Diese Datei verwaltet mehrere echte Lotterie-Profile. Jedes aktivierte Profil hat eigene Tickets, eigenen Topf, eigene Historie und eigene Ziehzeiten.
# EN: This file manages multiple real lottery profiles. Every enabled profile has its own tickets, pot, history and draw schedule.

settings:
  # DE: Aktiviert getrennte Lotterie-Profile. false bedeutet: normale Einzel-Lotterie aus config.yml.
  # EN: Enables separated lottery profiles. false means: normal single lottery from config.yml.
  enabled: false
  # DE: Aktives Profil, dessen Werte Ticketpreis, Zusatzbetrag, Mindestspieler, Typ und Ziehzeiten überschreiben können.
  # EN: Active profile whose values can override ticket price, base amount, minimum players, type and draw times.
  active-profile: "default"

profiles:
  default:
    # DE: Ob dieses Profil in Listen angezeigt und später auswählbar sein soll.
    # EN: Whether this profile is shown in lists and can later be selected.
    enabled: true
    # DE: Anzeigename des Profils im Chat oder in Admin-Ausgaben.
    # EN: Display name of this profile in chat or admin output.
    display-name: "Hauptlotterie"
    # DE: Optionale Berechtigung für diese Lotterie. Leer bedeutet keine Extra-Berechtigung.
    # EN: Optional permission for this lottery. Empty means no extra permission.
    permission: ""
    # DE: Optionaler GUI-Titel für dieses Profil. Leer bedeutet Titel aus gui/gui.yml verwenden.
    # EN: Optional GUI title for this profile. Empty means use the title from gui/gui.yml.
    gui-title: ""
    # DE: Optionaler Ticketpreis nur für dieses Profil. -1 bedeutet Wert aus config.yml verwenden.
    # EN: Optional ticket price only for this profile. -1 means use the value from config.yml.
    ticket-price: -1
    # DE: Optionaler Zusatzbetrag für den Topf. -1 bedeutet Wert aus config.yml verwenden.
    # EN: Optional base amount for the pot. -1 means use the value from config.yml.
    additional-pot-amount: -1
    # DE: Optionale Mindestspielerzahl für dieses Profil. -1 bedeutet Wert aus config.yml verwenden.
    # EN: Optional minimum player count for this profile. -1 means use the value from config.yml.
    minimum-players-to-draw: -1
    # DE: Optionaler Lotterie-Typ für dieses Profil: jackpot, fifty_fifty, fixed_prize oder item. Leer nutzt config.yml.
    # EN: Optional lottery type for this profile: jackpot, fifty_fifty, fixed_prize or item. Empty uses config.yml.
    lottery-type: ""
    # DE: Optionale Ziehzeiten im Format HH:mm. Leer bedeutet Zeitplan aus config.yml verwenden.
    # EN: Optional draw times in HH:mm format. Empty means use the schedule from config.yml.
    draw-times: []
