name: CraftplayLotterie
version: 1.0.0
main: dev.codex.lottery.LotteryPlugin
api-version: "1.21"
depend: [Vault]
softdepend: [PlaceholderAPI, CMI, Jobs, Quests, BeautyQuests, BetonQuest, PlayerHeads, HeadDatabase, LuckPerms]
authors: [Codex]
description: Craftplay Lotterie with GUI, PlaceholderAPI and webhook support.

commands:
  lottery:
    description: Main command for the lottery plugin
    usage: /lottery [help|buy|free|shop|gui|profile|reminders|winnerwall|jackpot|winners|stats|nextdraw|draw|simulate|reload|setjackpot|addjackpot|reset|info|admin|adminstats|taxreport|notifications|payments|backup|export|audit|web|import|debug|doctor|log|setupwizard|setup|season|preview|editor|lotteries|transactions|grantfree|updateconfigs]
    aliases: [lot]

permissions:
  lottery.use:
    description: Allows using player lottery commands
    default: true
  lottery.admin:
    description: Allows admin lottery actions
    default: op
