# Craftplay Lotterie - Hologramm-Konfiguration / Hologram configuration
# DE: Diese Datei steuert TextDisplay-Hologramme, deren Vorlagen und gespeicherte Positionen.
# EN: This file controls TextDisplay holograms, their templates and saved locations.

settings:
  # DE: Aktiviert alle Lotterie-Hologramme. EN: Enables all lottery holograms.
  enabled: true
  # DE: Aktualisierungsintervall in Sekunden. EN: Update interval in seconds.
  update-interval-seconds: 30
  # DE: true macht Text durch Blöcke sichtbar. EN: true makes text visible through blocks.
  see-through: false
  # DE: true rendert Text mit Schatten. EN: true renders text with shadow.
  shadowed: true

templates:
  # DE: Standard-Countdown-Hologramm. EN: Default countdown hologram.
  countdown:
    lines:
      - "&6&lCraftplay Lotterie"
      - "&7Nächste Ziehung in &e%time_left%"
      - "&7Ziehung um &e%draw_time%"
      - "&7Topf: &e%pot%"
  statistics:
    # DE: Für jede Statistikart gibt es einen eigenen Eintrag mit display-name und lines.
    # EN: Each statistic type has its own entry with display-name and lines.
    rounds_played:
      display-name: "Am meisten mitgespielt"
      lines:
        - "&6&lAm meisten mitgespielt"
        - "&7Top 10 nach gespielten Runden"
        - "%selected_top%"
    tickets_bought:
      display-name: "Meiste gekaufte Tickets"
      lines:
        - "&6&lMeiste Tickets"
        - "&7Top 10 nach gekauften Tickets"
        - "%selected_top%"
    money_spent:
      display-name: "Gesamtausgaben"
      lines:
        - "&6&lGesamtausgaben"
        - "&7Top 10 nach Ausgaben"
        - "%selected_top%"
    wins:
      display-name: "Am häufigsten gewonnen"
      lines:
        - "&6&lAm häufigsten gewonnen"
        - "&7Top 10 nach Gewinnen"
        - "%selected_top%"
    highest_win:
      display-name: "Höchster Gewinn"
      lines:
        - "&6&lHöchster Gewinn"
        - "&7Top 10 nach Einzelgewinn"
        - "%selected_top%"
    total_won:
      display-name: "Gesamt gewonnen"
      lines:
        - "&6&lGesamt gewonnen"
        - "&7Top 10 nach Gesamtgewinn"
        - "%selected_top%"
    current_tickets:
      display-name: "Aktuelle Tickets"
      lines:
        - "&6&lAktuelle Tickets"
        - "&7Top 10 der aktuellen Runde"
        - "%selected_top%"
    default:
      display-name: "Lotterie Statistik"
      lines:
        - "&6&lLotterie Statistik"
        - "&7Statistik: &e%statistic%"
        - "%selected_top%"

holograms: {}
