# Craftplay Lotterie - GUI-Konfiguration / GUI configuration
# DE: Diese Datei steuert alle Inventar-Menüs. Texte unterstützen Farbcodes (&) und PlaceholderAPI-Platzhalter.
# EN: This file controls all inventory menus. Texts support color codes (&) and PlaceholderAPI placeholders.
# DE: Gemeinsame Item-Einstellungen:
# DE: slot = einzelner Platz, slots = mehrere Plätze/Ranges, material = Bukkit-Material, head-database-id = HeadDatabase-Kopf,
# DE: skull-owner = Spielername für Player-Heads, name/lore = Anzeige, buy-amount = Ticketmenge am Kaufbutton,
# DE: refresh-after-click = GUI nach Klick aktualisieren, actions = Klickaktionen.
# EN: Shared item settings:
# EN: slot = one slot, slots = multiple slots/ranges, material = Bukkit material, head-database-id = HeadDatabase head,
# EN: skull-owner = player name for player heads, name/lore = display, buy-amount = ticket amount on buy buttons,
# EN: refresh-after-click = refresh GUI after click, actions = click actions.
# DE: Aktionen: buy:<anzahl>, close, open-stats, open-personal-stats, open-language, open-admin, open-main,
# DE: force-draw, reload-plugin, reset-round, language:<code>, player-command:<befehl>, console-command:<befehl>, message:<text>.
# EN: Actions: buy:<amount>, close, open-stats, open-personal-stats, open-language, open-admin, open-main,
# EN: force-draw, reload-plugin, reset-round, language:<code>, player-command:<command>, console-command:<command>, message:<text>.

gui:
  # DE: Aktiviert das Hauptmenü. EN: Enables the main menu.
  enabled: true
  # DE: Titel des Hauptmenüs. EN: Title of the main menu.
  title: "&6&lCraftplay Lotterie"
  # DE: Inventargröße, muss ein Vielfaches von 9 sein. EN: Inventory size, must be a multiple of 9.
  size: 36
  # DE: Standard-Füllmaterial für leere Slots. EN: Default filler material for empty slots.
  filler-material: "BLACK_STAINED_GLASS_PANE"
  # DE: Alle Buttons/Dekoitems des Hauptmenüs. EN: All buttons/decorative items in the main menu.
  items:
    top-decoration:
      slots: ["0-8", 27, 28, 29, 30, 32, 33]
      material: "YELLOW_STAINED_GLASS_PANE"
      name: "&6"
      lore: []
    buy-small:
      slot: 10
      material: "GOLD_NUGGET"
      buy-amount: 1
      refresh-after-click: true
      name: "&e%buy_amount% Ticket kaufen"
      lore:
        - "&7Preis: &f%buy_price%"
        - "&7Gekaufte Tickets: &f%tickets_total%"
        - "&7Topf: &f%pot%"
        - "&aKlicken zum Kaufen"
      actions:
        - "buy:%buy_amount%"
    buy-medium:
      slot: 11
      material: "GOLD_INGOT"
      buy-amount: 5
      refresh-after-click: true
      name: "&e%buy_amount% Tickets kaufen"
      lore:
        - "&7Preis: &f%buy_price%"
        - "&7Gekaufte Tickets: &f%tickets_total%"
        - "&7Topf: &f%pot%"
        - "&aKlicken zum Kaufen"
      actions:
        - "buy:%buy_amount%"
    pot-info:
      slot: 13
      material: "CHEST"
      name: "&6Aktueller Topf"
      lore:
        - "&7Topf gesamt: &f%pot%"
        - "&7Ticket-Einsätze: &f%ticket_pot%"
        - "&7Zusatzbetrag: &f%base_pot%"
        - "&7Gekaufte Tickets: &f%tickets_total%"
        - "&7Teilnehmer: &f%players%/%min_players%"
        - "&7Nächste Ziehung: &f%next_draw%"
      actions: []
    buy-large:
      slot: 15
      material: "GOLD_BLOCK"
      buy-amount: 10
      refresh-after-click: true
      name: "&e%buy_amount% Tickets kaufen"
      lore:
        - "&7Preis: &f%buy_price%"
        - "&7Gekaufte Tickets: &f%tickets_total%"
        - "&7Topf: &f%pot%"
        - "&aKlicken zum Kaufen"
      actions:
        - "buy:%buy_amount%"
    buy-very-large:
      slot: 16
      material: "EMERALD"
      buy-amount: 25
      refresh-after-click: true
      name: "&e%buy_amount% Tickets kaufen"
      lore:
        - "&7Preis: &f%buy_price%"
        - "&7Gekaufte Tickets: &f%tickets_total%"
        - "&7Topf: &f%pot%"
        - "&aKlicken zum Kaufen"
      actions:
        - "buy:%buy_amount%"
    player-head:
      slot: 22
      material: "PLAYER_HEAD"
      skull-owner: "%player_name%"
      name: "&f%player_name%"
      lore:
        - "&7Deine Tickets: &f%tickets%"
        - "&7Deine Chance: &f%chance%"
        - "&7CMI Balance: &f%cmi_user_balance_formatted%"
        - "&7Jobs Level: &f%jobsr_user_totallevels%"
        - "&7Quest Fortschritt: &f%quests_player_current_quest_names%"
      actions: []
    personal-statistics:
      slot: 30
      material: "PLAYER_HEAD"
      skull-owner: "%player_name%"
      name: "&bDeine Statistik"
      lore:
        - "&7Tickets gesamt: &f%player_stats_tickets_bought%"
        - "&7Ausgaben: &f%player_stats_money_spent%"
        - "&7Gewinne: &f%player_stats_wins%"
        - "&aKlicken zum Öffnen"
      actions:
        - "open-personal-stats"
    statistics:
      slot: 31
      material: "BOOK"
      name: "&6Statistik"
      lore:
        - "&7Top 10 Listen ansehen"
        - "&7für Tickets, Ausgaben,"
        - "&7Gewinne und Runden."
        - "&aKlicken zum Öffnen"
      actions:
        - "open-stats"
    language:
      slot: 32
      material: "WRITABLE_BOOK"
      name: "&bSprache"
      lore:
        - "&7Aktuelle Sprache wechseln."
        - "&aKlicken zum Öffnen"
      actions:
        - "open-language"
    admin:
      slot: 34
      material: "COMMAND_BLOCK"
      name: "&cAdmin"
      lore:
        - "&7Admin-Übersicht öffnen."
        - "&aKlicken zum Öffnen"
      actions:
        - "open-admin"
    close:
      slot: 35
      material: "BARRIER"
      name: "&cSchließen"
      lore:
        - "&7Klicke, um das Menü zu schließen."
      actions:
        - "close"

