# Craftplay Lotterie - Hauptkonfiguration / Main configuration
# DE: Jede Einstellung hat eine kurze deutsche und englische Erklärung direkt darüber.
# EN: Every setting has a short German and English explanation directly above it.

# DE: Interne Versionsnummer für automatische Migrationen. Bitte nur ändern, wenn du genau weißt, warum.
# EN: Internal version number for automatic migrations. Only change this if you know exactly why.
config-version: 9

update-checker:
  # DE: Aktiviert die Prüfung auf neue Plugin-Versionen über GitHub Releases.
  # EN: Enables checking for new plugin versions through GitHub Releases.
  enabled: true
  # DE: GitHub-Repository im Format Besitzer/Repository. Daraus wird die Standard-API-URL gebaut.
  # EN: GitHub repository in owner/repository format. This is used to build the default API URL.
  repository: "Wullverin2/Craftplay-Lotterie"
  # DE: Release-Kanal: stable prüft normale Releases, beta/dev erlauben auch Pre-Releases.
  # EN: Release channel: stable checks normal releases, beta/dev also allow pre-releases.
  channel: "stable"
  # DE: Optionale vollständige GitHub-API-URL. Leer bedeutet: nutze repository + /releases/latest.
  # EN: Optional full GitHub API URL. Empty means: use repository + /releases/latest.
  api-url: ""
  # DE: Prüft beim Serverstart asynchron, ob ein neuer Release verfügbar ist.
  # EN: Checks asynchronously on server startup whether a new release is available.
  check-on-startup: true
  # DE: Benachrichtigt Admins beim Join, wenn seit der letzten Prüfung ein neuer Release bekannt ist.
  # EN: Notifies admins on join when the latest check found a newer release.
  notify-admins-on-join: true
  # DE: Cache-Zeit in Minuten, bevor automatische Prüfungen erneut GitHub abfragen.
  # EN: Cache time in minutes before automatic checks query GitHub again.
  cache-minutes: 60
  # DE: Timeout der GitHub-Anfrage in Sekunden.
  # EN: Timeout for the GitHub request in seconds.
  timeout-seconds: 10
  clickable-download:
    # DE: Sendet Admins zusätzlich einen anklickbaren Download-Link im Chat.
    # EN: Also sends admins a clickable download link in chat.
    enabled: true

settings:
  # DE: Zeitzone für Ziehungen, Countdown, Tageslimits und Statistiken.
  # EN: Timezone used for draws, countdowns, daily limits and statistics.
  timezone: "Europe/Vienna"
  # DE: Preis für ein einzelnes Ticket.
  # EN: Price for one ticket.
  ticket-price: 250.0
  # DE: Fester Zusatzbetrag im Topf. Dieser wird nur für die aktuelle Anzeige/Ziehung addiert und nicht übertragen.
  # EN: Fixed base amount in the pot. It is only added for the current display/draw and is not carried over.
  additional-pot-amount: 1000.0
  # DE: Lotterie-Typ: jackpot zahlt den Topf, fifty_fifty zahlt 50%, fixed_prize zahlt fest, item nutzt Item-Einsätze.
  # EN: Lottery type: jackpot pays the pot, fifty_fifty pays 50%, fixed_prize pays fixed, item uses item stakes.
  lottery-type: "jackpot"
  # DE: Fester Gewinnbetrag für lottery-type fixed_prize.
  # EN: Fixed prize amount for lottery-type fixed_prize.
  fixed-prize-amount: 1000.0
  # DE: true begrenzt fixed_prize auf den aktuellen Topf.
  # EN: true caps fixed_prize to the current pot.
  fixed-prize-cap-to-pot: true
  # DE: Maximale Ticketanzahl pro Kaufvorgang.
  # EN: Maximum number of tickets per purchase action.
  tickets-per-purchase-max: 64
  # DE: Maximale Ticketanzahl, die ein Spieler in der aktuellen Runde besitzen darf.
  # EN: Maximum number of tickets a player may own in the current round.
  tickets-per-player-max: 256
  # DE: Mindestanzahl unterschiedlicher Spieler, damit eine Ziehung stattfindet.
  # EN: Minimum number of unique players required for a draw.
  minimum-players-to-draw: 1
  # DE: Steuer/Abzug vom Ticketpreis als Dezimalwert. 0.05 bedeutet 5% gehen nicht in den Topf.
  # EN: Tax/deduction from ticket price as decimal value. 0.05 means 5% does not go into the pot.
  tax-rate: 0.05
  # DE: Sendet eine Chat-Nachricht, wenn jemand Tickets kauft.
  # EN: Broadcasts a chat message when someone buys tickets.
  broadcast-ticket-purchases: true
  draw-time:
    # DE: Stunde der einzelnen Standardziehung, wenn mehrere Ziehungen deaktiviert sind.
    # EN: Hour of the single default draw when multiple draws are disabled.
    hour: 20
    # DE: Minute der einzelnen Standardziehung, wenn mehrere Ziehungen deaktiviert sind.
    # EN: Minute of the single default draw when multiple draws are disabled.
    minute: 0
  draw-schedule:
    # DE: true nutzt alle Zeiten aus settings.draw-schedule.times. false nutzt nur settings.draw-time.
    # EN: true uses all times from settings.draw-schedule.times. false uses only settings.draw-time.
    multiple-draws-enabled: false
    # DE: Liste zusätzlicher Ziehzeiten im Format HH:mm, wenn multiple-draws-enabled true ist.
    # EN: List of additional draw times in HH:mm format when multiple-draws-enabled is true.
    times:
      - "20:00"
      - "22:00"
    weekdays:
      # DE: true beschränkt Ziehungen auf die unten eingetragenen Wochentage.
      # EN: true restricts draws to the weekdays listed below.
      enabled: false
      # DE: Erlaubte Wochentage auf Englisch: MONDAY bis SUNDAY.
      # EN: Allowed weekdays in English: MONDAY to SUNDAY.
      days:
        - "MONDAY"
        - "TUESDAY"
        - "WEDNESDAY"
        - "THURSDAY"
        - "FRIDAY"
        - "SATURDAY"
        - "SUNDAY"
  # DE: Anzahl gespeicherter Gewinner in der Historie und GUI-Anzeige.
  # EN: Number of winners kept in history and GUI display.
  history-size: 10
  # DE: Sendet eine Nachricht, wenn bei der Ziehung keine Tickets vorhanden sind.
  # EN: Broadcasts a message when a draw has no tickets.
  broadcast-no-players: true
  # DE: Zahlt Ticketkosten zurück, wenn zu wenige Spieler für die Ziehung vorhanden sind.
  # EN: Refunds ticket costs when there are not enough players for the draw.
  refund-on-not-enough-players: true

pricing:
  tiered-prices:
    # DE: Aktiviert Paketpreise. Beispiel: 5 Tickets können günstiger sein als 5 einzelne Tickets.
    # EN: Enables package prices. Example: 5 tickets can be cheaper than 5 single tickets.
    enabled: false
    # DE: true zerlegt nicht exakt passende Mengen in die besten Paketgrößen plus Einzeltickets.
    # EN: true splits non-exact amounts into the best package sizes plus single tickets.
    best-fit: true
    # DE: Gesamtpreis pro Ticketmenge. "5: 1000" bedeutet: 5 Tickets kosten zusammen 1000.
    # EN: Total price per ticket amount. "5: 1000" means: 5 tickets cost 1000 total.
    tiers:
      "5": 1000.0
      "10": 1800.0
      "25": 4000.0

tax:
  target:
    # DE: Leitet die Ticket-Steuer zusätzlich auf ein Konto oder per Befehl weiter.
    # EN: Routes ticket tax additionally to an account or via commands.
    enabled: false
    # DE: Vault-Kontoname für die Steuer. Leer = nur Befehle ausführen.
    # EN: Vault account name for tax. Empty = only run commands.
    account: "Server"
    # DE: Konsolenbefehle bei Ticket-Steuer. Platzhalter: %player%, %tax%, %pot%.
    # EN: Console commands on ticket tax. Placeholders: %player%, %tax%, %pot%.
    commands: []

payout-tax:
  # DE: Aktiviert einen Abzug vom Gewinn vor der Auszahlung.
  # EN: Enables a deduction from prize payouts before paying winners.
  enabled: false
  # DE: Abzug vom Gewinn als Dezimalwert. 0.10 bedeutet 10%.
  # EN: Deduction from prize as decimal value. 0.10 means 10%.
  rate: 0.0
  # DE: Vault-Kontoname für den Gewinnabzug. Leer = kein Konto, nur Befehle.
  # EN: Vault account name for payout tax. Empty = no account, only commands.
  account: "Server"
  # DE: Konsolenbefehle für den Gewinnabzug. Platzhalter: %gross_amount%, %payout_tax%, %net_amount%.
  # EN: Console commands for payout tax. Placeholders: %gross_amount%, %payout_tax%, %net_amount%.
  commands: []

item-lottery:
  # DE: Aktiviert Tickets gegen Items statt Geld. Alternativ settings.lottery-type auf item setzen.
  # EN: Enables tickets for items instead of money. Alternatively set settings.lottery-type to item.
  enabled: false
  stake:
    # DE: Material, das pro Ticket abgegeben werden muss.
    # EN: Material required per ticket.
    material: "DIAMOND"
    # DE: Anzahl Items pro Ticket.
    # EN: Number of items per ticket.
    amount-per-ticket: 1
  # DE: Optionaler Geldbetrag, der pro Item-Ticket in den Topf gerechnet wird.
  # EN: Optional money amount added to the displayed pot per item ticket.
  money-pot-per-ticket: 0.0
  prize:
    item:
      # DE: Optionales Item, das Gewinner zusätzlich erhalten. amount 0 deaktiviert es.
      # EN: Optional item winners receive additionally. amount 0 disables it.
      material: "DIAMOND_BLOCK"
      # DE: Anzahl des Preis-Items.
      # EN: Amount of the prize item.
      amount: 0
    # DE: Konsolenbefehle für Item-Lotterie-Gewinner. Platzhalter: %player%, %rank%, %tickets%.
    # EN: Console commands for item lottery winners. Placeholders: %player%, %rank%, %tickets%.
    commands: []
  refund:
    # DE: Konsolenbefehle bei Item-Rückerstattung. Platzhalter: %player%, %player_uuid%, %item_amount%, %item%.
    # EN: Console commands on item refunds. Placeholders: %player%, %player_uuid%, %item_amount%, %item%.
    commands: []

storage:
  # DE: Speichertyp. yaml ist einfach, sqlite/mysql sind für größere Server geeignet.
  # EN: Storage type. yaml is simple, sqlite/mysql are useful for larger servers.
  type: "yaml"
  sqlite:
    # DE: Dateiname der SQLite-Datenbank im Plugin-Ordner.
    # EN: File name of the SQLite database inside the plugin folder.
    file: "storage.db"
  mysql:
    # DE: MySQL-Host oder IP-Adresse.
    # EN: MySQL host or IP address.
    host: "localhost"
    # DE: MySQL-Port.
    # EN: MySQL port.
    port: 3306
    # DE: Name der Datenbank.
    # EN: Database name.
    database: "craftplay_lottery"
    # DE: MySQL-Benutzername.
    # EN: MySQL username.
    username: "root"
    # DE: MySQL-Passwort.
    # EN: MySQL password.
    password: ""

payments:
  retry:
    # DE: Versucht fehlgeschlagene Offline-Auszahlungen regelmäßig erneut.
    # EN: Regularly retries failed offline payouts.
    enabled: true
    # DE: Abstand zwischen automatischen Zahlungs-Retrys in Minuten.
    # EN: Interval between automatic payment retries in minutes.
    interval-minutes: 10

purchase-confirmation:
  # DE: Aktiviert eine zweite Bestätigung bei teuren Käufen.
  # EN: Enables a second confirmation for expensive purchases.
  enabled: true
  # DE: Ab diesem Gesamtpreis muss der Spieler den Kauf erneut bestätigen.
  # EN: From this total price onward the player must confirm the purchase again.
  min-total-cost: 10000.0
  # DE: Zeitfenster für die Bestätigung in Sekunden.
  # EN: Confirmation window in seconds.
  timeout-seconds: 20

security:
  # DE: Wartezeit zwischen zwei Käufen pro Spieler in Sekunden. 0 deaktiviert den Cooldown.
  # EN: Wait time between purchases per player in seconds. 0 disables the cooldown.
  purchase-cooldown-seconds: 0
  # DE: Tageslimit für gekaufte Tickets pro Spieler. 0 deaktiviert das Limit.
  # EN: Daily limit for bought tickets per player. 0 disables the limit.
  daily-ticket-limit: 0
  # DE: Tageslimit für ausgegebenes Geld pro Spieler. 0 deaktiviert das Limit.
  # EN: Daily spending limit per player. 0 disables the limit.
  daily-spend-limit: 0.0
  # DE: Ab dieser Ticketanzahl bei einem Kauf erhalten Admins eine Warnung. 0 deaktiviert diese Warnung.
  # EN: Admins are warned from this ticket amount per purchase. 0 disables this warning.
  admin-warning-ticket-threshold: 0
  # DE: Ab diesem Kaufpreis erhalten Admins eine Warnung. 0 deaktiviert diese Warnung.
  # EN: Admins are warned from this purchase cost. 0 disables this warning.
  admin-warning-spend-threshold: 0.0
  anti-abuse:
    # DE: Aktiviert eine zusätzliche Kaufspitzen-Warnung für auffällige Ticketkäufe in kurzer Zeit.
    # EN: Enables an additional burst-purchase warning for suspicious ticket purchases in a short window.
    enabled: false
    # DE: Zeitfenster in Sekunden, in dem Käufe zusammengerechnet werden.
    # EN: Time window in seconds in which purchases are accumulated.
    window-seconds: 60
    # DE: Ab dieser Ticketanzahl im Zeitfenster werden Admins gewarnt. 0 deaktiviert die Ticketprüfung.
    # EN: Admins are warned from this ticket amount in the window. 0 disables the ticket check.
    tickets-threshold: 100
    # DE: Ab diesem Ausgabebetrag im Zeitfenster werden Admins gewarnt. 0 deaktiviert die Geldprüfung.
    # EN: Admins are warned from this spending amount in the window. 0 disables the money check.
    spend-threshold: 0.0
    # DE: Sendet die Warnung direkt an online Admins.
    # EN: Sends the warning directly to online admins.
    notify-admins: true
    # DE: Schreibt optional IP-Adressen ins Admin-Log. Aus Datenschutzgründen standardmäßig aus.
    # EN: Optionally writes IP addresses to the admin log. Disabled by default for privacy.
    include-ip-in-log: false

admin-safety:
  # DE: Erzwingt eine zweite Bestätigung für gefährliche Admin-Aktionen wie Reset, Force-Draw, Import und Profilwechsel.
  # EN: Requires a second confirmation for dangerous admin actions like reset, force draw, import and profile switch.
  confirm-dangerous-actions: true
  # DE: Zeitfenster für die zweite Bestätigung in Sekunden.
  # EN: Time window for the second confirmation in seconds.
  confirm-timeout-seconds: 20
  granular-permissions:
    # DE: Aktiviert zusätzliche Admin-Permissions wie lottery.admin.draw, lottery.admin.reload und lottery.admin.rollback.
    # EN: Enables additional admin permissions like lottery.admin.draw, lottery.admin.reload and lottery.admin.rollback.
    enabled: true

transactions:
  # DE: Aktiviert ein separates Transaktionslog für Käufe, Rückerstattungen und Auszahlungen.
  # EN: Enables a separate transaction log for purchases, refunds and payouts.
  enabled: true
  # DE: Maximale Anzahl gespeicherter Transaktionen.
  # EN: Maximum number of stored transactions.
  max-entries: 1000

winners:
  # DE: Aktiviert mehrere Gewinner pro Ziehung.
  # EN: Enables multiple winners per draw.
  multiple-enabled: false
  # DE: Gewinnanteile pro Platz. [70, 20, 10] bedeutet Platz 1/2/3 erhalten 70/20/10 Prozent der verteilten Summe.
  # EN: Prize shares per rank. [70, 20, 10] means rank 1/2/3 receive 70/20/10 percent of the distributed amount.
  prize-shares:
    - 100.0
  # DE: Aktiviert feste Auszahlungen statt prozentualer Gewinnanteile.
  # EN: Enables fixed payouts instead of percentage-based prize shares.
  fixed-payouts-enabled: false
  # DE: Feste Beträge pro Platz. Beispiel [1000, 500, 250] zahlt Platz 1/2/3 diese Beträge.
  # EN: Fixed amounts per rank. Example [1000, 500, 250] pays rank 1/2/3 these amounts.
  fixed-payouts:
    - 1000.0
  # DE: true verhindert, dass feste Auszahlungen zusammen mehr als den Topf auszahlen.
  # EN: true prevents fixed payouts from paying more than the pot in total.
  fixed-payouts-cap-to-pot: true
  # DE: true gibt einen Restbetrag bei festen Auszahlungen an Platz 1.
  # EN: true gives leftover money from fixed payouts to rank 1.
  fixed-payouts-add-leftover-to-first: true

jackpot-boost:
  # DE: Aktiviert einen Multiplikator auf den Anteil des Ticketpreises, der in den Topf geht.
  # EN: Enables a multiplier on the part of ticket price that goes into the pot.
  enabled: false
  # DE: Multiplikator für Ticket-Einsätze. 1.25 bedeutet 25% mehr Topfaufbau.
  # EN: Multiplier for ticket contributions. 1.25 means 25% more pot growth.
  multiplier: 1.25

seasons:
  # DE: Aktuelle Saison-ID für saisonale Statistiken.
  # EN: Current season id for seasonal statistics.
  current-id: "default"
  auto:
    # DE: Aktiviert automatische Saisonwechsel.
    # EN: Enables automatic season rotation.
    enabled: false
    # DE: Zeitraum für automatische Saison-IDs: daily, weekly, monthly oder yearly.
    # EN: Period for automatic season ids: daily, weekly, monthly or yearly.
    period: "monthly"
    # DE: Konsolenbefehle vor dem Saisonreset. Platzhalter: %old_season%, %new_season%.
    # EN: Console commands before the season reset. Placeholders: %old_season%, %new_season%.
    commands-before-reset: []
    # DE: Konsolenbefehle nach dem Saisonreset. Platzhalter: %old_season%, %new_season%.
    # EN: Console commands after the season reset. Placeholders: %old_season%, %new_season%.
    commands-after-reset: []
  rewards:
    # DE: Belohnt beim automatischen Saisonwechsel die Top-Spieler der gewählten Statistik.
    # EN: Rewards top players of the selected statistic during automatic season rotation.
    enabled: false
    # DE: Statistik für Saisonbelohnungen: total_won, wins, tickets_bought, money_spent oder rounds_played.
    # EN: Statistic for season rewards: total_won, wins, tickets_bought, money_spent or rounds_played.
    statistic: "total_won"
    # DE: Wie viele Plätze belohnt werden.
    # EN: How many ranks are rewarded.
    top-limit: 3
    # DE: Konsolenbefehle pro belohntem Spieler. Platzhalter: %player%, %rank%, %value%, %old_season%, %new_season%.
    # EN: Console commands per rewarded player. Placeholders: %player%, %rank%, %value%, %old_season%, %new_season%.
    commands: []

backups:
  auto-after-draw:
    # DE: Erstellt nach jeder Ziehung automatisch ein ZIP-Backup.
    # EN: Automatically creates a ZIP backup after every draw.
    enabled: true
  retention:
    # DE: Löscht automatisch alte Backup-ZIPs, wenn mehr als max-files vorhanden sind. 0 deaktiviert das Löschen.
    # EN: Automatically deletes old backup ZIPs when more than max-files exist. 0 disables deletion.
    max-files: 30

fairness:
  # DE: Aktiviert nachvollziehbare Ziehungen mit Seed, Hash und Ticket-Roll.
  # EN: Enables verifiable draws with seed, hash and ticket roll.
  enabled: true
  # DE: Zeigt den Hash vor der Gewinnerermittlung im Chat.
  # EN: Shows the hash in chat before winners are calculated.
  broadcast-hash-before-draw: true
  # DE: Zeigt Seed und Prüfdaten nach der Ziehung im Chat.
  # EN: Shows seed and verification data after the draw.
  broadcast-proof-after-draw: true

rollback:
  # DE: Aktiviert /lottery rollback für die letzte Ziehung.
  # EN: Enables /lottery rollback for the last draw.
  enabled: true
  # DE: true zieht ausgezahlte Gewinne beim Rollback wieder von Gewinnern ab.
  # EN: true withdraws paid winnings from winners during rollback.
  withdraw-payouts: true
  # DE: true erlaubt Rollback auch dann, wenn in der neuen Runde schon Tickets gekauft wurden.
  # EN: true allows rollback even when tickets were already bought in the new round.
  allow-overwrite-active-round: false

eligibility:
  players:
    # DE: Spieler auf dieser Liste dürfen nicht teilnehmen. Namen oder UUIDs sind erlaubt.
    # EN: Players on this list cannot participate. Names or UUIDs are allowed.
    blacklist: []
    whitelist:
      # DE: Aktiviert eine Spielerliste, nur diese Spieler dürfen teilnehmen.
      # EN: Enables a player whitelist, only these players may participate.
      enabled: false
      # DE: Erlaubte Spieler als Name oder UUID.
      # EN: Allowed players by name or UUID.
      players: []
  permission:
    # DE: Aktiviert eine Teilnahme-Berechtigung.
    # EN: Enables a participation permission.
    enabled: false
    # DE: Spieler brauchen diese Permission, wenn permission.enabled true ist.
    # EN: Players need this permission when permission.enabled is true.
    node: "lottery.participate"
  worlds:
    # DE: Beschränkt Ticketkäufe auf bestimmte Welten.
    # EN: Restricts ticket purchases to specific worlds.
    enabled: false
    # DE: Erlaubte Welten für Ticketkäufe.
    # EN: Worlds allowed for ticket purchases.
    allowed:
      - "world"
  # DE: Mindestspielzeit in Minuten, bevor Spieler teilnehmen dürfen. 0 deaktiviert die Prüfung.
  # EN: Minimum playtime in minutes before players may join. 0 disables the check.
  min-playtime-minutes: 0
  groups:
    # DE: Aktiviert Gruppen-/Rangprüfung über Permissions wie group.vip, luckperms.group.vip oder cmi.rank.vip.
    # EN: Enables group/rank checks via permissions like group.vip, luckperms.group.vip or cmi.rank.vip.
    enabled: false
    # DE: Spieler in diesen Gruppen werden blockiert.
    # EN: Players in these groups are blocked.
    blocked: []
    # DE: Wenn nicht leer, dürfen nur Spieler in diesen Gruppen teilnehmen.
    # EN: If not empty, only players in these groups may participate.
    allowed: []

free-tickets:
  # DE: Aktiviert kostenlose Tickets über /lottery free [grund].
  # EN: Enables free tickets via /lottery free [reason].
  enabled: false
  reasons:
    default:
      # DE: Anzahl kostenloser Tickets.
      # EN: Number of free tickets.
      amount: 1
      # DE: Wartezeit bis zur nächsten Einlösung in Stunden.
      # EN: Cooldown until the next claim in hours.
      cooldown-hours: 24
      # DE: Optional benötigte Permission. Leer deaktiviert die Prüfung.
      # EN: Optional required permission. Empty disables the check.
      permission: ""
      # DE: Mindestspielzeit in Minuten für diese kostenlosen Tickets.
      # EN: Minimum playtime in minutes for these free tickets.
      min-playtime-minutes: 0
      # DE: Geldbetrag, der pro kostenlosem Ticket in den Topf addiert wird.
      # EN: Money amount added to the pot per free ticket.
      money-pot-per-ticket: 0.0
      # DE: Konsolenbefehle nach erfolgreicher Einlösung.
      # EN: Console commands after a successful claim.
      commands-on-claim: []
    playtime:
      amount: 1
      cooldown-hours: 24
      permission: ""
      min-playtime-minutes: 60
      money-pot-per-ticket: 0.0
      commands-on-claim: []
    jobs:
      amount: 1
      cooldown-hours: 24
      permission: "lottery.free.jobs"
      min-playtime-minutes: 0
      money-pot-per-ticket: 0.0
      commands-on-claim: []
    quests:
      amount: 1
      cooldown-hours: 24
      permission: "lottery.free.quests"
      min-playtime-minutes: 0
      money-pot-per-ticket: 0.0
      commands-on-claim: []
    votes:
      amount: 1
      cooldown-hours: 24
      permission: "lottery.free.votes"
      min-playtime-minutes: 0
      money-pot-per-ticket: 0.0
      commands-on-claim: []

season-shop:
  # DE: Aktiviert Saisonpunkte und /lottery shop.
  # EN: Enables season points and /lottery shop.
  enabled: false
  points:
    # DE: Punkte pro gekauftem Ticket.
    # EN: Points per bought ticket.
    ticket-purchase: 1
    # DE: Punkte pro eingelöstem Free-Ticket-Paket.
    # EN: Points per claimed free-ticket package.
    free-ticket-claim: 1
    # DE: Punkte pro Teilnahme an einer abgeschlossenen Ziehung.
    # EN: Points per participation in a finished draw.
    round-played: 1
    # DE: Punkte pro Gewinn.
    # EN: Points per win.
    win: 10
  rewards:
    default:
      # DE: Anzeigename der Belohnung.
      # EN: Display name of the reward.
      name: "Beispiel-Belohnung"
      # DE: Kosten in Saisonpunkten.
      # EN: Cost in season points.
      cost: 10
      # DE: Konsolenbefehle beim Kauf. Platzhalter: %player%, %reward%, %points%.
      # EN: Console commands on purchase. Placeholders: %player%, %reward%, %points%.
      commands:
        - "eco give %player% 100"

ticket-gifts:
  # DE: Aktiviert /lottery gift <spieler> <anzahl>, damit Spieler anderen Tickets kaufen koennen.
  # EN: Enables /lottery gift <player> <amount>, allowing players to buy tickets for others.
  enabled: true
  # DE: Maximale Anzahl Tickets pro Geschenk. 0 nutzt kein Extra-Limit.
  # EN: Maximum tickets per gift. 0 means no extra limit.
  max-per-gift: 64
  # DE: Sendet eine Servernachricht, wenn ein Spieler Tickets verschenkt.
  # EN: Broadcasts a server message when a player gifts tickets.
  broadcast: true

group-lottery:
  # DE: Aktiviert /lottery group <name>, damit Freunde/Clans Gewinne teilen koennen.
  # EN: Enables /lottery group <name>, allowing friends/clans to share winnings.
  enabled: true
  # DE: Teilt den Gewinn eines Gewinners auf teilnehmende Gruppenmitglieder derselben Runde auf.
  # EN: Splits a winner's payout between participating group members of the same round.
  share-winnings: true
  # DE: Mindestanzahl teilnehmender Gruppenmitglieder, bevor ein Gewinn geteilt wird.
  # EN: Minimum participating group members required before a payout is shared.
  min-members-to-share: 2
  # DE: Maximale Laenge eines Gruppennamens.
  # EN: Maximum length of a group name.
  max-name-length: 24

lucky-number:
  # DE: Spieler koennen mit /lottery lucky <zahl> eine Glueckszahl setzen.
  # EN: Players can set a lucky number with /lottery lucky <number>.
  enabled: true
  # DE: Kleinste erlaubte Glueckszahl.
  # EN: Smallest allowed lucky number.
  min: 1
  # DE: Groesste erlaubte Glueckszahl.
  # EN: Largest allowed lucky number.
  max: 99
  # DE: Geldbonus, wenn die gesetzte Glueckszahl bei einer Ziehung getroffen wird.
  # EN: Money bonus when a player's lucky number is hit during a draw.
  bonus-money: 250.0
  # DE: true bedeutet: Der Spieler braucht mindestens ein Ticket in der aktuellen Runde.
  # EN: true means the player needs at least one ticket in the current round.
  require-current-ticket: true
  # DE: Verkuendet die gezogene Glueckszahl im Chat.
  # EN: Announces the drawn lucky number in chat.
  broadcast-drawn-number: true
  # DE: Konsolenbefehle fuer Glueckszahl-Treffer. Platzhalter: %player%, %lucky_number%, %lucky_bonus%.
  # EN: Console commands for lucky-number hits. Placeholders: %player%, %lucky_number%, %lucky_bonus%.
  commands: []

consolation-prizes:
  # DE: Aktiviert Trostpreise fuer Teilnehmer ohne Hauptgewinn.
  # EN: Enables consolation prizes for participants who did not win the main prize.
  enabled: true
  # DE: Geldbetrag pro Trostpreis. 0 deaktiviert nur die Geldzahlung, Befehle laufen weiter.
  # EN: Money amount per consolation prize. 0 disables only the money payout, commands still run.
  money: 0.0
  # DE: Mindestanzahl Tickets, damit ein Spieler einen Trostpreis erhalten kann.
  # EN: Minimum tickets required for a player to receive a consolation prize.
  minimum-tickets: 1
  # DE: Sendet Spielern eine Nachricht, wenn sie einen Trostpreis erhalten.
  # EN: Sends players a message when they receive a consolation prize.
  notify: true
  # DE: Konsolenbefehle fuer Trostpreise. Platzhalter: %player%, %tickets%, %consolation_amount%.
  # EN: Console commands for consolation prizes. Placeholders: %player%, %tickets%, %consolation_amount%.
  commands: []

pity-bonus:
  # DE: Aktiviert einen Bonus nach mehreren verlorenen Teilnahmen in Folge.
  # EN: Enables a bonus after several losing participations in a row.
  enabled: true
  # DE: Anzahl verlorener Runden in Folge, ab der der Bonus gezahlt wird.
  # EN: Number of lost rounds in a row required before the bonus is paid.
  losing-streak-threshold: 5
  # DE: Geldbonus fuer die Pechserie. 0 deaktiviert nur die Geldzahlung.
  # EN: Money bonus for the losing streak. 0 disables only the money payout.
  money: 500.0
  # DE: Setzt die Pechserie nach dem Bonus wieder auf 0.
  # EN: Resets the losing streak to 0 after the bonus.
  reset-streak-after-reward: true
  # DE: Konsolenbefehle fuer den Pechserien-Bonus. Platzhalter: %player%, %losing_streak%, %pity_amount%.
  # EN: Console commands for pity bonuses. Placeholders: %player%, %losing_streak%, %pity_amount%.
  commands: []

community-goals:
  # DE: Aktiviert gemeinsame Ticketziele pro Runde, die den Topf boosten oder Befehle ausfuehren.
  # EN: Enables shared per-round ticket goals that boost the pot or run commands.
  enabled: true
  goals:
    starter:
      # DE: Anzeigename des Community-Ziels.
      # EN: Display name of the community goal.
      name: "Community Starter"
      # DE: Ab dieser Gesamtzahl gekaufter Tickets wird das Ziel einmal pro Runde ausgeloest.
      # EN: This total ticket count triggers the goal once per round.
      tickets: 25
      # DE: Betrag, der beim Erreichen direkt in den Topf gelegt wird.
      # EN: Amount added directly to the pot when the goal is reached.
      add-pot: 1000.0
      # DE: Sendet eine Chatnachricht beim Erreichen.
      # EN: Sends a chat message when reached.
      broadcast: true
      # DE: Konsolenbefehle beim Erreichen. Platzhalter: %goal_name%, %goal_tickets%, %goal_bonus%, %pot%.
      # EN: Console commands when reached. Placeholders: %goal_name%, %goal_tickets%, %goal_bonus%, %pot%.
      commands: []

achievements:
  # DE: Aktiviert Lotterie-Erfolge fuer Spieler.
  # EN: Enables lottery achievements for players.
  enabled: true
  # DE: Sendet eine Servernachricht, wenn ein Erfolg freigeschaltet wird.
  # EN: Broadcasts when an achievement is unlocked.
  broadcast: true
  # DE: Jeder Eintrag nutzt enabled (aktiv), name (Anzeigename) und commands (Konsolenbefehle beim Freischalten).
  # EN: Each entry uses enabled, name, and commands (console commands when unlocked).
  items:
    first_ticket:
      enabled: true
      name: "Erstes Ticket"
      commands: []
    tickets_10:
      enabled: true
      name: "10 Tickets gekauft"
      commands: []
    tickets_100:
      enabled: true
      name: "100 Tickets gekauft"
      commands: []
    first_win:
      enabled: true
      name: "Erster Gewinn"
      commands: []
    wins_5:
      enabled: true
      name: "Glueckspilz"
      commands: []
    spent_10000:
      enabled: true
      name: "Jackpotjaeger"
      commands: []
    lucky_hit:
      enabled: true
      name: "Glueckszahl getroffen"
      commands: []
    pity_reward:
      enabled: true
      name: "Comeback Bonus"
      commands: []
    gift_ticket:
      enabled: true
      name: "Grosszuegig"
      commands: []

vip-cosmetics:
  # DE: Aktiviert kosmetische Effekte fuer Spieler mit Permission, ohne Gewinnchancen zu veraendern.
  # EN: Enables cosmetic effects for players with permission without changing win chances.
  enabled: true
  # DE: Permission fuer kosmetische Lotterie-Effekte.
  # EN: Permission for cosmetic lottery effects.
  permission: "lottery.vip"
  # DE: Sound beim Ticketkauf fuer VIP-Spieler.
  # EN: Sound played on ticket purchase for VIP players.
  purchase-sound: "ENTITY_EXPERIENCE_ORB_PICKUP"
  # DE: Konsolenbefehle beim VIP-Ticketkauf. Platzhalter: %player%, %amount%, %cost%.
  # EN: Console commands on VIP ticket purchase. Placeholders: %player%, %amount%, %cost%.
  commands-on-purchase: []

mystery-jackpot:
  # DE: Aktiviert einen geheimen Zusatzbetrag, der erst kurz vor der Ziehung in den Topf gelegt wird.
  # EN: Enables a hidden bonus amount that is added to the pot right before the draw.
  enabled: false
  # DE: Minimaler Mystery-Bonus.
  # EN: Minimum mystery bonus.
  min-amount: 500.0
  # DE: Maximaler Mystery-Bonus.
  # EN: Maximum mystery bonus.
  max-amount: 2500.0
  # DE: Sendet die Enthuellung des Mystery-Bonus im Chat.
  # EN: Broadcasts the mystery bonus reveal in chat.
  broadcast: true

admin-log:
  # DE: Aktiviert das Admin-Log für wichtige Aktionen.
  # EN: Enables the admin log for important actions.
  enabled: true
  # DE: Maximale Anzahl gespeicherter Logeinträge.
  # EN: Maximum number of stored log entries.
  max-entries: 500

rewards:
  # DE: Konsolenbefehle, die für jeden Gewinner ausgeführt werden.
  # EN: Console commands executed for every winner.
  commands-on-win: []
  commands-by-rank:
    # DE: Befehle nur für Platz 1.
    # EN: Commands only for rank 1.
    "1": []
    # DE: Befehle nur für Platz 2.
    # EN: Commands only for rank 2.
    "2": []
    # DE: Befehle nur für Platz 3.
    # EN: Commands only for rank 3.
    "3": []
  packages:
    # DE: Aktiviert zufällige Bonuspakete für Gewinner.
    # EN: Enables random bonus packages for winners.
    enabled: false
    items:
      default:
        # DE: Interner/angezeigter Name des Bonuspakets.
        # EN: Internal/display name of this bonus package.
        name: "Standard Bonus"
        # DE: Gewichtung für die zufällige Auswahl. Höher bedeutet wahrscheinlicher.
        # EN: Weight for random selection. Higher means more likely.
        weight: 100
        # DE: Konsolenbefehle, die bei diesem Bonuspaket ausgeführt werden.
        # EN: Console commands executed for this bonus package.
        commands:
          - "broadcast %player% hat das Bonuspaket %reward_package% erhalten!"

draw-animation:
  # DE: Aktiviert Countdown-Nachrichten vor der Gewinnerverkündung.
  # EN: Enables countdown messages before winner reveal.
  enabled: true
  # DE: Sekundenwerte, die im Countdown angezeigt werden.
  # EN: Second values shown in the countdown.
  countdown: [5, 4, 3, 2, 1]
  # DE: Abstand zwischen Countdown-Schritten in Sekunden.
  # EN: Delay between countdown steps in seconds.
  step-seconds: 1
  gui:
    # DE: Öffnet während der Ziehung ein kleines animiertes Gewinner-GUI für online Spieler.
    # EN: Opens a small animated winner GUI for online players during the draw.
    enabled: true
    # DE: true oeffnet das Animations-GUI fuer alle automatisch. false bedeutet: Spieler muessen /lottery watch klicken.
    # EN: true opens the animation GUI for everyone automatically. false means players must click /lottery watch.
    auto-open-for-everyone: false
    pre-notice:
      # DE: Sendet kurz vor der Ziehung eine anklickbare Nachricht zum Zuschauen.
      # EN: Sends a clickable watch message shortly before the draw.
      enabled: true
      # DE: Wie viele Sekunden vor der Ziehung die Zuschauen-Nachricht gesendet wird.
      # EN: How many seconds before the draw the watch message is sent.
      seconds-before: 30
      # DE: Befehl, der beim Klick auf die Zuschauen-Nachricht ausgefuehrt wird.
      # EN: Command executed when clicking the watch message.
      command: "/lottery watch"
    # DE: Titel des Ziehungs-GUIs.
    # EN: Title of the draw GUI.
    title: "&6&lLotterie Ziehung"
    # DE: Inventargröße des Ziehungs-GUIs.
    # EN: Inventory size of the draw GUI.
    size: 27
    # DE: Slot, in dem Kandidaten und Gewinner angezeigt werden.
    # EN: Slot where candidates and the winner are displayed.
    winner-slot: 13
    # DE: Anzahl der Namenswechsel vor dem Gewinner.
    # EN: Number of name switches before the winner.
    spins: 12
    # DE: Abstand zwischen Namenswechseln in Ticks.
    # EN: Delay between name switches in ticks.
    interval-ticks: 4

language:
  # DE: Standardsprache für Konsole und Spieler ohne eigene Auswahl.
  # EN: Default language for console and players without a custom selection.
  default: "de"

help:
  clickable:
    # DE: Macht /lottery help im Spiel anklickbar.
    # EN: Makes /lottery help clickable in game.
    enabled: true

docs:
  # DE: Erstellt beim Start PLACEHOLDERS.md im Plugin-Ordner.
  # EN: Creates PLACEHOLDERS.md in the plugin folder on startup.
  generate-placeholder-docs: true

notifications:
  player-preferences:
    # DE: Standardwert für persönliche Benachrichtigungen, solange Spieler nichts anderes gesetzt haben.
    # EN: Default value for personal notifications until players choose another setting.
    default-enabled: true
  pot-threshold:
    # DE: Aktiviert eine einmalige Nachricht pro Runde, sobald der Topf einen Betrag erreicht.
    # EN: Enables a once-per-round message when the pot reaches a configured amount.
    enabled: false
    # DE: Topf-Betrag, ab dem die Pot-Reminder-Nachricht gesendet wird.
    # EN: Pot amount from which the pot reminder message is sent.
    amount: 10000.0
  ticket-holder-reminder:
    # DE: Erinnert Spieler mit Tickets kurz vor der Ziehung nochmal persönlich.
    # EN: Reminds ticket holders personally shortly before the draw.
    enabled: true
    # DE: Wie viele Minuten vor der Ziehung die Erinnerung gesendet wird.
    # EN: How many minutes before the draw the reminder is sent.
    minutes-before-draw: 10
  join-reminder:
    # DE: Sendet Spielern beim Join einen Lotterie-Hinweis.
    # EN: Sends players a lottery reminder when they join.
    enabled: true
  win-effects:
    # DE: Aktiviert Sound/Titel bei Gewinnern.
    # EN: Enables sound/title effects for winners.
    enabled: true
    # DE: Bukkit-Soundname für den Gewinn.
    # EN: Bukkit sound name for the win.
    sound: "ENTITY_PLAYER_LEVELUP"
    # DE: Titeltext beim Gewinn.
    # EN: Title text shown on win.
    title: "&6&lLottery"
    # DE: Untertitel beim Gewinn.
    # EN: Subtitle shown on win.
    subtitle: "&e%player% &7hat &6%amount% &7gewonnen!"

webhook:
  # DE: Aktiviert Discord/Webhook-Nachrichten.
  # EN: Enables Discord/webhook messages.
  enabled: false
  # DE: Ziel-URL des Webhooks.
  # EN: Target URL of the webhook.
  url: ""
  # DE: Anzeigename des Webhook-Bots.
  # EN: Display name of the webhook bot.
  username: "Lottery"
  # DE: Standardnachricht für Gewinner-Webhooks.
  # EN: Default message for winner webhooks.
  message: "**Lottery:** %player% hat %amount% mit %tickets% Ticket(s) gewonnen. Nächste Ziehung: %next_draw%"
  embed:
    # DE: Aktiviert Embed-Format für Gewinner-Webhooks.
    # EN: Enables embed format for winner webhooks.
    enabled: true
    # DE: Embed-Titel.
    # EN: Embed title.
    title: "Craftplay Lotterie Gewinner"
    # DE: Embed-Beschreibung.
    # EN: Embed description.
    description: "%player% hat den Lotterie-Topf gewonnen."
    # DE: Embed-Farbe als Dezimalzahl.
    # EN: Embed color as decimal number.
    color: 16766720
  events:
    ticket-purchase:
      # DE: Aktiviert Webhook für Ticketkäufe.
      # EN: Enables webhook for ticket purchases.
      enabled: false
      # DE: Nachricht für Ticketkauf-Webhooks.
      # EN: Message for ticket purchase webhooks.
      message: "**Ticketkauf:** %player% hat %amount% Ticket(s) für %cost% gekauft. Topf: %pot%"
      embed:
        # DE: Aktiviert Discord-Embed für dieses Event.
        # EN: Enables Discord embed for this event.
        enabled: false
        # DE: Embed-Titel.
        # EN: Embed title.
        title: "Ticket gekauft"
        # DE: Embed-Beschreibung.
        # EN: Embed description.
        description: "%player% hat %amount% Ticket(s) gekauft. Topf: %pot%"
        # DE: Embed-Farbe als Dezimalzahl.
        # EN: Embed color as decimal number.
        color: 16766720
    draw-not-enough-players:
      # DE: Aktiviert Webhook, wenn zu wenige Spieler dabei waren.
      # EN: Enables webhook when there were not enough players.
      enabled: false
      # DE: Nachricht für fehlgeschlagene Ziehungen wegen zu weniger Spieler.
      # EN: Message for failed draws due to not enough players.
      message: "**Lotterie:** Zu wenige Spieler. Rückerstattung: %refunded% an %refunded_players% Spieler."
      embed:
        # DE: Aktiviert Discord-Embed für dieses Event.
        # EN: Enables Discord embed for this event.
        enabled: false
        # DE: Embed-Titel.
        # EN: Embed title.
        title: "Ziehung abgebrochen"
        # DE: Embed-Beschreibung.
        # EN: Embed description.
        description: "Zu wenige Spieler. Rückerstattung: %refunded%."
        # DE: Embed-Farbe als Dezimalzahl.
        # EN: Embed color as decimal number.
        color: 15158332
    draw-no-players:
      # DE: Aktiviert Webhook, wenn keine Tickets vorhanden waren.
      # EN: Enables webhook when no tickets existed.
      enabled: false
      # DE: Nachricht für Ziehungen ohne Teilnehmer.
      # EN: Message for draws without participants.
      message: "**Lotterie:** Keine Tickets vorhanden, Ziehung ohne Gewinner beendet."
      embed:
        # DE: Aktiviert Discord-Embed für dieses Event.
        # EN: Enables Discord embed for this event.
        enabled: false
        # DE: Embed-Titel.
        # EN: Embed title.
        title: "Keine Teilnehmer"
        # DE: Embed-Beschreibung.
        # EN: Embed description.
        description: "Die Ziehung wurde ohne Gewinner beendet."
        # DE: Embed-Farbe als Dezimalzahl.
        # EN: Embed color as decimal number.
        color: 9807270

announcements:
  draw:
    # DE: Aktiviert regelmäßige Chat-Ankündigungen der nächsten Ziehung.
    # EN: Enables recurring chat announcements for the next draw.
    enabled: true
    # DE: Sendet bei mehreren Lotterie-Profilen je Profil eine eigene Ankündigung.
    # EN: Sends one announcement per lottery profile when multiple profiles are enabled.
    per-profile-enabled: true
    # DE: Abstand zwischen Ankündigungen in Minuten.
    # EN: Interval between announcements in minutes.
    interval-minutes: 30
    # DE: Verzögerung nach Serverstart/Reload bis zur ersten Ankündigung in Sekunden.
    # EN: Delay after server start/reload before the first announcement in seconds.
    start-delay-seconds: 60
    buy-button:
      # DE: Aktiviert den anklickbaren Kaufbutton in der Ankündigung.
      # EN: Enables the clickable buy button in the announcement.
      enabled: true
      # DE: Text des Kaufbuttons. Leer nutzt messages.draw-announcement-button aus der Sprachdatei.
      # EN: Text of the buy button. Empty uses messages.draw-announcement-button from the language file.
      text: "&a[Hier könnt ihr das Ticket kaufen]"
      # DE: Befehl, der beim Klick ausgeführt wird.
      # EN: Command executed when clicking the button.
      command: "/lottery gui"
